<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#0d1117;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:2rem;width:360px}
.form-control{background:#21262d;border:1px solid #30363d;color:#e6edf3}
.form-control:focus{background:#21262d;border-color:#58a6ff;color:#e6edf3;box-shadow:none}
label{color:#8b949e}h4{color:#e6edf3}</style></head>
<body><div class="box">
  <h4 class="mb-1 text-center">🤖 Parser Bot</h4>
  <p class="text-center mb-4" style="color:#8b949e;font-size:.85rem">Admin Panel</p>
  {% with msgs=get_flashed_messages() %}{% if msgs %}<div class="alert alert-danger py-2">{{ msgs[0] }}</div>{% endif %}{% endwith %}
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="mb-3"><label class="form-label">Логін</label><input type="text" name="username" class="form-control" autofocus required></div>
    <div class="mb-3"><label class="form-label">Пароль</label><input type="password" name="password" class="form-control" required></div>
    <button class="btn btn-primary w-100">Увійти</button>
  </form>
</div></body></html>
