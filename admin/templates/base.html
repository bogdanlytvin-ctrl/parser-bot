<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Parser Bot Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#0d1117;color:#e6edf3}
.sidebar{min-height:100vh;background:#161b22;border-right:1px solid #30363d}
.sidebar .brand{padding:18px 20px;font-weight:700;color:#58a6ff;border-bottom:1px solid #30363d;font-size:1.05rem}
.sidebar a{color:#8b949e;text-decoration:none;display:block;padding:9px 20px;font-size:.9rem}
.sidebar a:hover,.sidebar a.active{color:#e6edf3;background:#21262d}
main{padding:1.5rem}
.card{background:#161b22;border:1px solid #30363d;color:#e6edf3}
.table{color:#e6edf3}.table>:not(caption)>*>*{background:#161b22;border-color:#30363d}
.table-hover tbody tr:hover>*{background:#21262d}
.form-control,.form-select{background:#21262d;border:1px solid #30363d;color:#e6edf3}
.form-control:focus,.form-select:focus{background:#21262d;border-color:#58a6ff;color:#e6edf3;box-shadow:none}
.page-link{background:#161b22;border-color:#30363d;color:#58a6ff}
.page-link:hover{background:#21262d;color:#fff}
.text-muted{color:#8b949e!important}
.stat-card{border-left:3px solid}
.s-blue{border-color:#58a6ff}.s-green{border-color:#3fb950}.s-orange{border-color:#d29922}.s-purple{border-color:#a371f7}.s-pink{border-color:#f778ba}
</style></head>
<body><div class="container-fluid g-0"><div class="row g-0">
<nav class="col-md-2 sidebar">
  <div class="brand">🤖 Parser Bot</div>
  <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint=='dashboard' }}">📊 Dashboard</a>
  <a href="{{ url_for('tasks') }}"     class="{{ 'active' if 'task' in request.endpoint }}">📋 Задачі</a>
  <a href="{{ url_for('users') }}"     class="{{ 'active' if request.endpoint=='users' }}">👥 Користувачі</a>
  <hr style="border-color:#30363d;margin:6px 20px">
  <a href="{{ url_for('logout') }}" style="color:#f85149">🚪 Вийти</a>
</nav>
<main class="col-md-10">
{% with msgs=get_flashed_messages() %}{% if msgs %}{% for m in msgs %}
<div class="alert alert-warning alert-dismissible">{{ m }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
{% endfor %}{% endif %}{% endwith %}
{% block content %}{% endblock %}
</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
